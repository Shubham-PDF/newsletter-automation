name: Daily Technical Newsletter

on:
  schedule:
    # 2:30 AM UTC (02:30 UTC = 8:00 AM IST)
    - cron: '30 2 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Newsletter Pipeline
      env:
        PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        GMAIL_SMTP_EMAIL: ${{ secrets.GMAIL_SMTP_EMAIL }}
        GMAIL_SMTP_PASSWORD: ${{ secrets.GMAIL_SMTP_PASSWORD }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python run_newsletter.py

    - name: Commit and Push History
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add history/
        git diff --staged --quiet || git commit -m "chore: update featured repo history [skip ci]"
        git push

